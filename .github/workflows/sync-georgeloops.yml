name: Sync Loop Sources

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Loops Radar
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync public loop source markdown
        run: npm run sync:loops
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify synced app
        run: |
          npm run typecheck
          npm run build

      - name: Open pull request when loops change
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/sync-loop-sources
          commit-message: "Sync loop source markdown"
          title: "Sync loop source markdown"
          body: |
            Weekly sync from configured public loop sources.

            This updates Loops Radar so each loop detail page copies the source markdown from the public source repos listed in `sources/loop-repos.json`.
